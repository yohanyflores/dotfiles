# ==============================================================================
# Tmux para desarrollo en contenedores
# Estilo: minimalista, inspirado en Zellij y Catppuccin Mocha
# Requisitos: tmux >= 3.0 (sin plugins ni dependencias externas)
# ==============================================================================

# --- Terminal y comportamiento ------------------------------------------------
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm*:Tc,screen*:Tc,alacritty*:Tc,foot*:Tc,kitty*:Tc"
set -s set-clipboard on

# Ctrl-Space es el líder principal; F12 es una alternativa sin conflictos.
# Pulsar dos veces cualquiera de ellos lo envía a la aplicación interna.
unbind C-b
unbind C-a
set -g prefix C-Space
set -g prefix2 F12
bind C-Space send-prefix
bind F12 send-prefix -2

set -g mouse on
set -g focus-events on
set -sg escape-time 10
set -g repeat-time 500
set -g history-limit 100000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
setw -g aggressive-resize on
setw -g automatic-rename on
set -g allow-rename off

# Reflejar sesión y ventana en el título de la terminal.
set -g set-titles on
set -g set-titles-string "#S / #W — tmux"

# --- Paneles ------------------------------------------------------------------
# Marcos y títulos de panel como Zellij: discretos en reposo y claros al enfocar.
set -g pane-border-status top
set -g pane-border-style "fg=#45475a"
set -g pane-active-border-style "fg=#cba6f7"
set -g pane-border-format " #[fg=#{?pane_active,#cba6f7,#585b70}]#P #[fg=#{?pane_active,#cdd6f4,#6c7086}]#{pane_current_command} "
set -g display-panes-colour "#6c7086"
set -g display-panes-active-colour "#cba6f7"
set -g display-panes-time 2000

# --- Barra de estado ----------------------------------------------------------
# Una sola barra superior imita la jerarquía de Zellij: identidad y pestañas a
# la izquierda, contexto del contenedor a la derecha. Sin powerlines ni iconos.
set -g status on
set -g status-position top
set -g status-interval 5
set -g status-justify left
set -g status-style "fg=#7f849c,bg=#181825"
set -g status-left-length 50
set -g status-right-length 100

# El nombre cambia a COMMAND mientras cualquiera de los líderes está activo.
set -g status-left " #[fg=#{?client_prefix,#f9e2af,#cba6f7},bold]#{?client_prefix,COMMAND,tmux} #[fg=#a6adc8,nobold]#S #[fg=#45475a]│"
set -g status-right "#[fg=#6c7086]#{b:pane_current_path} #[fg=#45475a]│ #[fg=#a6adc8]#H #[fg=#45475a]│ #[fg=#cba6f7,bold]%H:%M "

set -g window-status-separator " "
setw -g window-status-format "#[fg=#7f849c,bg=#181825] #I #W#{?window_zoomed_flag, ·Z,} "
setw -g window-status-current-format "#[fg=#11111b,bg=#cba6f7,bold] #I #W#{?window_zoomed_flag, ·Z,} "
setw -g window-status-activity-style "fg=#f9e2af,bg=#181825,bold"
setw -g monitor-activity on
set -g activity-action other

set -g message-style "fg=#cdd6f4,bg=#313244"
set -g message-command-style "fg=#1e1e2e,bg=#f9e2af,bold"
setw -g mode-style "fg=#1e1e2e,bg=#89b4fa,bold"

# --- Ventanas y paneles -------------------------------------------------------
# Los paneles y ventanas nuevas conservan el directorio de trabajo actual.
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Navegación tipo Vim con prefijo: Ctrl-Space seguido de h/j/k/l.
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Alt + flechas permite moverse como en Zellij, sin pulsar el prefijo.
bind -n M-Left select-pane -L
bind -n M-Down select-pane -D
bind -n M-Up select-pane -U
bind -n M-Right select-pane -R

# Mantener H/J/K/L pulsado redimensiona de forma continua.
bind -r H resize-pane -L 3
bind -r J resize-pane -D 2
bind -r K resize-pane -U 2
bind -r L resize-pane -R 3

bind z resize-pane -Z
bind Space next-layout
bind > swap-pane -D
bind < swap-pane -U
bind q display-panes

# Navegadores interactivos nativos de tmux para sesiones y ventanas.
bind s choose-tree -Zs
bind w choose-tree -Zw
bind x confirm-before -p "¿Cerrar panel #P? (y/n)" kill-pane
bind X confirm-before -p "¿Cerrar ventana #I? (y/n)" kill-window

# --- Selección y portapapeles -------------------------------------------------
setw -g mode-keys vi
set -g status-keys vi
bind [ copy-mode
bind ] paste-buffer
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel

# --- Utilidades ---------------------------------------------------------------
bind r source-file ~/.tmux.conf \; display-message "tmux.conf recargado"
bind ? list-keys
