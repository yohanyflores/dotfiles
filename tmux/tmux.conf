# ==============================================================================
# Tmux para desarrollo en contenedores
# Estilo: réplica visual sobria de la interfaz predeterminada de Zellij
# Requisitos: tmux >= 3.3 (sin plugins ni dependencias externas)
# ==============================================================================

# --- Terminal y comportamiento ------------------------------------------------
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm*:Tc,screen*:Tc,alacritty*:Tc,foot*:Tc,kitty*:Tc"
set -s set-clipboard on
# Permitir protocolos gráficos envueltos para tmux desde paneles visibles.
set -g allow-passthrough on

# Ctrl-G es el líder común con el modo Locked de Zellij.
# En la capa de comandos, Alt-G entrega un Ctrl-G real a la aplicación interna.
unbind C-b
unbind C-a
unbind C-Space
unbind F12
set -g prefix C-g
set -g prefix2 None
bind C-g send-prefix
bind M-g send-keys C-g

set -g mouse on
set -g focus-events on
set -sg escape-time 10
set -g repeat-time 500
set -g history-limit 100000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
setw -g aggressive-resize on
setw -g automatic-rename on
set -g allow-rename off

# Reflejar sesión y ventana en el título de la terminal.
set -g set-titles on
set -g set-titles-string "#S / #W — tmux"

# --- Paneles ------------------------------------------------------------------
# Colores tomados de la interfaz actual de Zellij.
set -g pane-border-status top
set -g pane-border-style "fg=#666666"
set -g pane-active-border-style "fg=#afff00"
set -g pane-border-format "#[fg=#{?pane_active,#afff00,#8a8a8a},bold] #{pane_current_command} #{pane_current_path} "
set -g display-panes-colour "#8a8a8a"
set -g display-panes-active-colour "#afff00"
set -g display-panes-time 2000

# --- Barra de estado ----------------------------------------------------------
# Una sola barra superior imita la jerarquía de Zellij: identidad y pestañas a
# la izquierda, e indicador de comando a la derecha mientras el líder está activo.
set -g status on
set -g status-position top
set -g status-interval 5
set -g status-justify left
set -g status-style "fg=#8a8a8a,bg=#000000"
set -g status-left-length 50
set -g status-right-length 30

# Identidad como Zellij (sesión), con modo de comandos visible sólo al activarlo.
set -g status-left "#[fg=#eeeeee,bg=#000000,bold] TMUX (#S) "
set -g status-right "#[fg=#{?client_prefix,#ff00ff,#000000},bold]#{?client_prefix, Ctrl-G ,}#[fg=#{?client_prefix,#8a8a8a,#000000},nobold]#{?client_prefix, COMMAND ,}"

set -g window-status-separator " "
setw -g window-status-format "#[fg=#8a8a8a,bg=#000000] #I #W#{?window_zoomed_flag, ·Z,} "
setw -g window-status-current-format "#[fg=#000000,bg=#afff00]#[fg=#000000,bg=#afff00,bold] #I #W#{?window_zoomed_flag, ·Z,} #[fg=#afff00,bg=#000000]"
setw -g window-status-activity-style "fg=#ff00ff,bg=#000000,bold"
setw -g monitor-activity on
set -g activity-action other

set -g message-style "fg=#eeeeee,bg=#000000"
set -g message-command-style "fg=#000000,bg=#afff00,bold"
setw -g mode-style "fg=#000000,bg=#afff00,bold"

# --- Ventanas y paneles -------------------------------------------------------
# Los paneles y ventanas nuevas conservan el directorio de trabajo actual.
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Navegación tipo Vim con prefijo: Ctrl-G seguido de h/j/k/l.
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Alt + flechas permite moverse como en Zellij, sin pulsar el prefijo.
bind -n M-Left select-pane -L
bind -n M-Down select-pane -D
bind -n M-Up select-pane -U
bind -n M-Right select-pane -R

# Mantener H/J/K/L pulsado redimensiona de forma continua.
bind -r H resize-pane -L 3
bind -r J resize-pane -D 2
bind -r K resize-pane -U 2
bind -r L resize-pane -R 3

bind z resize-pane -Z
# Selector de layouts inspirado en los swap layouts de Zellij.
bind Space display-menu -T " DISEÑO " \
  "Mosaico" t "select-layout tiled" \
  "Columnas" c "select-layout even-horizontal" \
  "Filas" f "select-layout even-vertical" \
  "Principal izquierda" l "select-layout main-vertical" \
  "Principal arriba" u "select-layout main-horizontal"

# Recorrer layouts directamente, igual que Alt-[ / Alt-] en Zellij.
bind -n M-[ select-layout -p
bind -n M-] select-layout -n
bind > swap-pane -D
bind < swap-pane -U
bind q display-panes

# Navegadores interactivos nativos de tmux para sesiones y ventanas.
bind s choose-tree -Zs
bind w choose-tree -Zw
bind x confirm-before -p "¿Cerrar panel #P? (y/n)" kill-pane
bind X confirm-before -p "¿Cerrar ventana #I? (y/n)" kill-window

# --- Selección y portapapeles -------------------------------------------------
setw -g mode-keys vi
set -g status-keys vi
bind [ copy-mode
bind ] paste-buffer
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel

# --- Utilidades ---------------------------------------------------------------
bind r source-file ~/.tmux.conf \; display-message "tmux.conf recargado"
bind ? list-keys
