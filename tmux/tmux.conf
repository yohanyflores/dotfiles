# ==============================================================================
# Tmux para desarrollo en contenedores
# Estilo: minimalista, inspirado en Zellij y Catppuccin Mocha
# Requisitos: tmux >= 3.0 (sin plugins ni dependencias externas)
# ==============================================================================

# --- Terminal y comportamiento ------------------------------------------------
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm*:Tc,screen*:Tc,alacritty*:Tc,foot*:Tc,kitty*:Tc"
set -s set-clipboard on

# Ctrl-Space evita los atajos habituales de editores y shells. Pulsarlo dos
# veces envía Ctrl-Space a la aplicación que corre dentro de tmux.
unbind C-b
unbind C-a
set -g prefix C-Space
bind C-Space send-prefix

set -g mouse on
set -g focus-events on
set -sg escape-time 10
set -g repeat-time 500
set -g history-limit 100000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
setw -g aggressive-resize on
setw -g automatic-rename on
set -g allow-rename off

# Reflejar sesión y ventana en el título de la terminal.
set -g set-titles on
set -g set-titles-string "#S / #W — tmux"

# --- Paneles ------------------------------------------------------------------
# Una etiqueta pequeña por panel aporta la claridad visual de Zellij sin ocupar
# una barra adicional. El borde violeta señala el panel que recibe el teclado.
set -g pane-border-status top
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#cba6f7"
set -g pane-border-format " #[fg=#{?pane_active,#cba6f7,#6c7086}]#P #[fg=#a6adc8]#{pane_current_command} "
set -g display-panes-colour "#6c7086"
set -g display-panes-active-colour "#cba6f7"
set -g display-panes-time 2000

# --- Barra de estado ----------------------------------------------------------
# Paleta Catppuccin Mocha. La barra sólo muestra contexto accionable:
# sesión | ventanas | directorio | contenedor/host | hora.
set -g status on
set -g status-position bottom
set -g status-interval 5
set -g status-justify centre
set -g status-style "fg=#a6adc8,bg=#11111b"
set -g status-left-length 40
set -g status-right-length 100

# Al pulsar el prefijo, TMUX cambia a KEYS como indicador de modo.
set -g status-left "#[fg=#1e1e2e,bg=#89b4fa,bold] #{?client_prefix,KEYS,TMUX} #[fg=#cdd6f4,bg=#313244,nobold] #S "
set -g status-right "#[fg=#a6adc8,bg=#313244] #{b:pane_current_path} #[fg=#1e1e2e,bg=#a6e3a1,bold] #H #[fg=#1e1e2e,bg=#89b4fa,bold] %H:%M "

set -g window-status-separator " "
setw -g window-status-format "#[fg=#6c7086,bg=#181825] #I #[fg=#a6adc8]#W#{?window_zoomed_flag, Z,} "
setw -g window-status-current-format "#[fg=#1e1e2e,bg=#cba6f7,bold] #I #W#{?window_zoomed_flag, Z,} "
setw -g window-status-activity-style "fg=#f9e2af,bg=#181825,bold"
setw -g monitor-activity on
set -g activity-action other

set -g message-style "fg=#cdd6f4,bg=#313244"
set -g message-command-style "fg=#1e1e2e,bg=#f9e2af,bold"
setw -g mode-style "fg=#1e1e2e,bg=#89b4fa,bold"

# --- Ventanas y paneles -------------------------------------------------------
# Los paneles y ventanas nuevas conservan el directorio de trabajo actual.
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Navegación tipo Vim con prefijo: Ctrl-Space seguido de h/j/k/l.
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Alt + flechas permite moverse como en Zellij, sin pulsar el prefijo.
bind -n M-Left select-pane -L
bind -n M-Down select-pane -D
bind -n M-Up select-pane -U
bind -n M-Right select-pane -R

# Mantener H/J/K/L pulsado redimensiona de forma continua.
bind -r H resize-pane -L 3
bind -r J resize-pane -D 2
bind -r K resize-pane -U 2
bind -r L resize-pane -R 3

bind z resize-pane -Z
bind Space next-layout
bind > swap-pane -D
bind < swap-pane -U
bind q display-panes

# Navegadores interactivos nativos de tmux para sesiones y ventanas.
bind s choose-tree -Zs
bind w choose-tree -Zw
bind x confirm-before -p "¿Cerrar panel #P? (y/n)" kill-pane
bind X confirm-before -p "¿Cerrar ventana #I? (y/n)" kill-window

# --- Selección y portapapeles -------------------------------------------------
setw -g mode-keys vi
set -g status-keys vi
bind [ copy-mode
bind ] paste-buffer
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel

# --- Utilidades ---------------------------------------------------------------
bind r source-file ~/.tmux.conf \; display-message "tmux.conf recargado"
bind ? list-keys
