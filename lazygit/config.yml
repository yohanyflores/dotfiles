customCommands:
  - key: '<a-c>'
    command: 'git-agy-commit'
    context: 'files'
    subprocess: true
    description: 'Generar mensaje de commit con agy (AI)'
  - key: '<a-C>'
    command: 'git-opencode-commit'
    context: 'files'
    subprocess: true
    description: 'Generar mensaje de commit con OpenCode (AI)'
