[[mgr.prepend_keymap]]
on = "<A-d>"
run = "shell -- ripdrag --no-click --and-exit --icon-size 64 --target --all \"$@\""
desc = "Arrastrar y soltar archivos desde y hacia Yazi"

[[mgr.prepend_keymap]]
on = ["M", "b"]
desc = "Start bunny.yazi"
run = "plugin bunny"

# Optionally, add another keymap to immediately fuzzy search bookmarks
[[mgr.prepend_keymap]]
desc = "Start bunny.yazi fuzzy search"
on = ["M", "B"]
run = "plugin bunny fuzzy"

[[mgr.prepend_keymap]]
on = [ "e", "t" ]
run = "plugin eza-preview"
desc = "Toggle tree/list dir preview"

[[mgr.prepend_keymap]]
on = [ "e", "-" ]
run = "plugin eza-preview inc-level"
desc = "Increment tree level"

[[mgr.prepend_keymap]]
on = [ "e", "_" ]
run = "plugin eza-preview dec-level"
desc = "Decrement tree level"

[[mgr.prepend_keymap]]
on = [ "e", "$" ]
run = "plugin eza-preview toggle-follow-symlinks"
desc = "Toggle tree follow symlinks"

[[mgr.prepend_keymap]]
on = [ "e", "*" ]
run = "plugin eza-preview toggle-hidden"
desc = "Toggle hidden files"

[[mgr.prepend_keymap]]
on = [ "e", "g", "i" ]
run = "plugin eza-preview toggle-git-ignore"
desc = "Toggle .gitignore files"

[[mgr.prepend_keymap]]
on = [ "e", "g", "s" ]
run = "plugin eza-preview toggle-git-status"
desc = "Toggle showing git status"
